name: Build and Push Cam Dashboard (External)

on:
  repository_dispatch:
    types: [trigger-build]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 🔽 Checkout frontend repo
      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: kishorek421/godezk_device_cam_dashboard_frontend
          token: ${{ secrets.PAT_TOKEN }}
          ref: main

      # 🔽 Generate nginx.conf
      - name: Generate nginx.conf
        run: |
          cat > nginx.conf << 'EOF'
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;

              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
              }

              location = /index.html {
                  add_header Cache-Control "no-cache, no-store, must-revalidate";
              }

              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff" always;
          }
          EOF

      # 🔽 Generate Dockerfile
      - name: Generate Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM node:20-slim AS builder
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          RUN npm run build

          FROM nginx:alpine
          COPY --from=builder /app/dist /usr/share/nginx/html
          COPY nginx.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      # 🔽 Docker login
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔽 Setup buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔽 Build and push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            kishore2712/cam-dashboard:latest
            kishore2712/cam-dashboard:${{ github.sha }}
          cache-from: type=registry,ref=kishore2712/cam-dashboard:buildcache
          cache-to: type=registry,ref=kishore2712/cam-dashboard:buildcache,mode=max

      # 🔽 Summary
      - name: Summary
        run: |
          echo "✅ Image pushed: kishore2712/cam-dashboard:latest"
          echo "✅ Image pushed: kishore2712/cam-dashboard:${{ github.sha }}"
